<!DOCTYPE html>
<html lang="pt-BR">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0"/>
  <title>KPI Gastos</title>
  <link href="https://fonts.googleapis.com/css2?family=DM+Serif+Display:ital@0;1&family=DM+Mono:wght@400;500&display=swap" rel="stylesheet"/>
  <style>
    *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }

    :root {
      --bg: #0f0e0c;
      --surface: #1a1815;
      --border: #2e2b26;
      --accent: #e8c97a;
      --accent-dim: #a8893a;
      --text: #f0ece3;
      --muted: #7a7060;
      --red: #d97070;
      --green: #7ab87a;
    }

    body {
      background: var(--bg);
      min-height: 100vh;
      display: flex;
      align-items: center;
      justify-content: center;
      font-family: 'DM Mono', monospace;
      padding: 2rem;
    }

    .card {
      background: var(--surface);
      border: 1px solid var(--border);
      border-radius: 16px;
      padding: 2rem 2.4rem;
      width: 320px;
      position: relative;
      overflow: hidden;
      box-shadow: 0 0 40px rgba(232,201,122,0.05), 0 8px 32px rgba(0,0,0,0.4);
    }

    .card::before {
      content: '';
      position: absolute;
      top: 0; left: 0; right: 0;
      height: 2px;
      background: linear-gradient(90deg, transparent, var(--accent), transparent);
    }

    .card-header {
      display: flex;
      align-items: center;
      gap: 0.6rem;
      margin-bottom: 1.6rem;
    }

    .icon {
      width: 32px;
      height: 32px;
      background: rgba(232,201,122,0.1);
      border: 1px solid rgba(232,201,122,0.2);
      border-radius: 8px;
      display: flex;
      align-items: center;
      justify-content: center;
      font-size: 15px;
    }

    .label {
      font-size: 11px;
      letter-spacing: 0.12em;
      text-transform: uppercase;
      color: var(--muted);
    }

    .value-wrap {
      margin-bottom: 1.4rem;
    }

    .value {
      font-family: 'DM Serif Display', serif;
      font-size: 2.8rem;
      color: var(--text);
      line-height: 1;
      transition: opacity 0.3s;
    }

    .value.loading {
      opacity: 0.3;
    }

    .currency-tag {
      font-family: 'DM Mono', monospace;
      font-size: 11px;
      color: var(--accent-dim);
      letter-spacing: 0.08em;
      margin-top: 4px;
    }

    .divider {
      height: 1px;
      background: var(--border);
      margin: 1.2rem 0;
    }

    .meta {
      display: flex;
      justify-content: space-between;
      align-items: center;
    }

    .filter-badge {
      font-size: 10px;
      letter-spacing: 0.1em;
      text-transform: uppercase;
      color: var(--accent);
      background: rgba(232,201,122,0.08);
      border: 1px solid rgba(232,201,122,0.15);
      border-radius: 20px;
      padding: 3px 10px;
    }

    .status {
      font-size: 10px;
      color: var(--muted);
      display: flex;
      align-items: center;
      gap: 5px;
    }

    .dot {
      width: 6px; height: 6px;
      border-radius: 50%;
      background: var(--muted);
      animation: none;
    }

    .dot.pulse {
      background: var(--accent);
      animation: pulse 1.4s ease-in-out infinite;
    }

    .dot.ok { background: var(--green); }
    .dot.err { background: var(--red); }

    @keyframes pulse {
      0%, 100% { opacity: 1; transform: scale(1); }
      50% { opacity: 0.4; transform: scale(0.7); }
    }

    .error-msg {
      font-size: 11px;
      color: var(--red);
      margin-top: 0.6rem;
      display: none;
    }

    /* breakdown pills */
    .breakdown {
      margin-top: 1rem;
      display: flex;
      flex-wrap: wrap;
      gap: 6px;
    }

    .pill {
      font-size: 10px;
      letter-spacing: 0.06em;
      color: var(--muted);
      background: rgba(255,255,255,0.03);
      border: 1px solid var(--border);
      border-radius: 20px;
      padding: 2px 9px;
      transition: color 0.2s;
    }

    .pill span {
      color: var(--text);
    }
  </style>
</head>
<body>

<div class="card">
  <div class="card-header">
    <div class="icon">💸</div>
    <span class="label">Total de Gastos</span>
  </div>

  <div class="value-wrap">
    <div class="value loading" id="value">R$ —</div>
    <div class="currency-tag">BRL · Base de Gastos</div>
  </div>

  <div class="breakdown" id="breakdown"></div>

  <div class="divider"></div>

  <div class="meta">
    <div id="filter-badge" class="filter-badge">todos os meses</div>
    <div class="status">
      <div class="dot pulse" id="dot"></div>
      <span id="status-text">carregando...</span>
    </div>
  </div>

  <div class="error-msg" id="error-msg"></div>
</div>

<script>
  const DATABASE_ID = "f18038a7-ecf3-4414-8a50-51237ff56109";

  // Filtro opcional: defina um mês aqui ("Abr", "Mar", etc.) ou deixe null para todos
  const FILTER_MES = null;

  async function fetchTotal() {
    const dot = document.getElementById('dot');
    const statusText = document.getElementById('status-text');
    const valueEl = document.getElementById('value');
    const errorEl = document.getElementById('error-msg');
    const badgeEl = document.getElementById('filter-badge');
    const breakdownEl = document.getElementById('breakdown');

    const prompt = FILTER_MES
      ? `Use the Notion MCP to query the database with ID "${DATABASE_ID}". Filter entries where "Mês" = "${FILTER_MES}". Sum all values in the "Custo" column and return ONLY a JSON object like: {"total": 1234.56, "count": 10, "breakdown": {"Alimentaçao": 200, "Delivery": 150}}. No extra text.`
      : `Use the Notion MCP to query the database with ID "${DATABASE_ID}". Get ALL entries. Sum all values in the "Custo" column and return ONLY a JSON object like: {"total": 1234.56, "count": 10, "breakdown": {"Alimentaçao": 200, "Delivery": 150}}. No extra text.`;

    try {
      const response = await fetch("https://api.anthropic.com/v1/messages", {
        method: "POST",
        headers: { "Content-Type": "application/json" },
        body: JSON.stringify({
          model: "claude-sonnet-4-20250514",
          max_tokens: 1000,
          system: "You are a data assistant. When asked to query Notion databases, use the MCP tool to do so and return only the requested JSON. No markdown, no explanation.",
          messages: [{ role: "user", content: prompt }],
          mcp_servers: [{
            type: "url",
            url: "https://mcp.notion.com/mcp",
            name: "notion-mcp"
          }]
        })
      });

      const data = await response.json();

      // Extract text from content blocks
      const textBlocks = data.content?.filter(b => b.type === "text").map(b => b.text).join("");
      const clean = textBlocks.replace(/```json|```/g, "").trim();
      const parsed = JSON.parse(clean);

      const total = parsed.total ?? 0;
      const count = parsed.count ?? 0;
      const breakdown = parsed.breakdown ?? {};

      // Update UI
      valueEl.classList.remove('loading');
      valueEl.textContent = "R$ " + total.toLocaleString('pt-BR', { minimumFractionDigits: 2, maximumFractionDigits: 2 });

      badgeEl.textContent = FILTER_MES ? `mês: ${FILTER_MES}` : `todos os meses`;

      dot.className = 'dot ok';
      statusText.textContent = `${count} lançamento${count !== 1 ? 's' : ''}`;

      // Render breakdown pills
      breakdownEl.innerHTML = '';
      const sorted = Object.entries(breakdown).sort((a, b) => b[1] - a[1]).slice(0, 5);
      sorted.forEach(([cat, val]) => {
        const pill = document.createElement('div');
        pill.className = 'pill';
        pill.innerHTML = `${cat} <span>R$${val.toLocaleString('pt-BR', {minimumFractionDigits: 0, maximumFractionDigits: 0})}</span>`;
        breakdownEl.appendChild(pill);
      });

    } catch (err) {
      dot.className = 'dot err';
      statusText.textContent = 'erro';
      valueEl.textContent = 'R$ —';
      errorEl.style.display = 'block';
      errorEl.textContent = err.message || 'Erro ao buscar dados';
      console.error(err);
    }
  }

  fetchTotal();
</script>
</body>
</html>
